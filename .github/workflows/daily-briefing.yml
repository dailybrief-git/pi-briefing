name: Daily briefing

on:
  schedule:
    # 00:00 Asia/Bangkok = 17:00 UTC.
    - cron: "0 17 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate briefings (all users)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          MODEL: ${{ vars.MODEL || 'claude-sonnet-5' }}
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          PROFILE_URL: ${{ secrets.PROFILE_URL }}
        run: python generate.py

      - name: Commit updated state back to main
        run: |
          git config user.name  "pi-briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add users
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Briefing $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Publish to GitHub Pages (gh-pages branch)
        run: |
          rm -rf _site && mkdir -p _site
          for d in users/*/ ; do
            name=$(basename "$d")
            [ -f "$d/dashboard_latest.html" ] || continue
            mkdir -p "_site/$name"
            cp "$d/dashboard_latest.html" "_site/$name/index.html"
            cp "$d"/dashboard_*.html "_site/$name/" 2>/dev/null || true
          done
          # Keep Anthony's existing root bookmark working.
          if [ -f users/anthony/dashboard_latest.html ]; then
            cp users/anthony/dashboard_latest.html _site/index.html
          fi
          # Publish the onboarding questionnaire at a shareable URL.
          if [ -f onboarding.html ]; then
            cp onboarding.html _site/onboarding.html
          fi
          cd _site
          git init -q
          git config user.name  "pi-briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -q -m "Publish $(date -u +%Y-%m-%d)"
          git branch -M gh-pages
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages
